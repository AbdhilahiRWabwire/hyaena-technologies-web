[workspace]
resolver = "2"

[package]
description = "Hyaena Technologies Web Service"
edition = "2024"
include = [
  "Cargo.toml",
  "src/**/*"
]
name = "hyaena_technologies_web"
publish = false
rust-version = "1.85.1"
version = "0.2.0"

[[bin]]
name = "htnet"
path = "src/main.rs"

[dependencies]
config = "0.15.9"
futures = "0.3.31"
hyper = "1.6.0"
hyper-util = "0.1.10"
log = "0.4.26"
minio = "0.1.0"
opentelemetry = "0.28.0"
opentelemetry-http = "0.28.0"
opentelemetry-otlp = "0.28.0"
opentelemetry-stdout = "0.28.0"
opentelemetry_sdk = "0.28.0"
serde_json = "1.0.140"
surrealdb = "2.2.1"

[dev-dependencies]
regex = "1.11.1"
